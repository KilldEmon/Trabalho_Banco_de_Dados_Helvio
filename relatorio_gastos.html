<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <title>Visualizador de Progressão - Relatório</title>
</head>
<body>
    <header>
        <h1>Painel do Jogador</h1>
        <p>Gerenciamento de Heróis e Equipamentos</p>
    </header>

    <div class="container">
        <div class="Menu-Lateral">
            <h3>Menu</h3>
            <button id="btn-lista-herois">Lista Heróis</button>
            <button id="btn-add-heroi">Adicionar Novo Herói</button>
            <button id="btn-lista-equipamento">Lista Equipamentos</button>
            <button id="btn-add-equipamento">Registrar Equipamento</button>
            <button id="btn-relatorio">Relatório de Poder</button>
        </div>

        <div class="menu-principal">
            <table>
                <thead>
                    <tr>
                        <th colspan="3">Relatório de Poder de Equipamentos por Herói</th>
                    </tr>
                    <tr>
                        <th>Herói</th>
                        <th>Qtd de Equipamentos</th>
                        <th>Poder de Ataque Total</th>
                    </tr>
                </thead>
                <tbody id="tabela-relatorio"></tbody>
            </table>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
