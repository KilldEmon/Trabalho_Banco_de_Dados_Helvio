<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <title>Visualizador de Progressão - Lista Heróis</title>
</head>
<body>
    <header>
        <h1>Painel do Jogador</h1>
        <p>Gerenciamento de Heróis e Equipamentos</p>
    </header>

    <div class="container">
        <div class="Menu-Lateral">
            <h3>Menu</h3>
            <button id="btn-lista-herois">Lista Heróis</button>
            <button id="btn-add-heroi">Adicionar Novo Herói</button>
            <button id="btn-lista-equipamento">Lista Equipamentos</button>
            <button id="btn-add-equipamento">Registrar Equipamento</button>
            <button id="btn-relatorio">Relatório de Poder</button>
        </div>

        <div class="menu-principal">      
            <div class="filtro">   
                <p class="espaço-filtro">Filtrar por Classe:</p>
                <select id="filtro-classe">
                    <option value="Todos">Todos</option>
                    <option value="Mago">Mago</option>
                    <option value="Guerreiro">Guerreiro</option>
                    <option value="Arqueiro">Arqueiro</option>
                    <option value="Tank">Tank</option>
                    <option value="Necromancer">Necromancer</option>
                </select>
                <button id="btn-buscar">Buscar</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th colspan="6">Informações dos Personagens</th>
                    </tr>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Classe</th>
                        <th>Nível Atual</th>
                        <th>Desbloqueio</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-herois"></tbody>
            </table>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
